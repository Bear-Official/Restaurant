<!DOCTYPE html>
<html lang="ru">

<head>
    <title>Restaurant</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/swiper-bundle.min.css">
    <link rel="stylesheet" href="css/style.min.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header--right">
                <picture>
                    <a href="#" class="header__link">
                        <h1 class="header__title">Logos</h1>
                    </a>
                </picture>
                <form action="#" class="header__form">
                    <img src="../images/Location.svg" alt="Location" class="header__img">
                    <input type="text" placeholder="Введите адрес доставки" name="search" class="header__input">
                    <button type="submit" class="header__button"><img src="../images/Search.png" alt="search"
                            class="header__search"></button>
                </form>
                <div class="header__contacts">
                    <img src="../images/phone.png" alt="phone" class="header__phone">
                    <div class="header__items">
                        <span class="header--contact">Контакты:</span>
                        <a href="tel:+7(917) 510-57-59" class="header__tel--link">+7 (917) 510-57-59</a>
                    </div>
                </div>
                <div class="header__cart">
                    <span class="header__cart--title">Корзина</span>
                    <div class="header__border"></div>
                    <div class="header__block">
                        <span class="header__cart--count">4</span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <div class="slider">
        <div class="slider--container">
            <!-- Slider main container -->
            <div class="swiper">
                <!-- Additional required wrapper -->
                <div class="swiper-wrapper">
                    <!-- Slides -->
                    <div class="swiper-slide">
                        <p class="slider__description">
                            Доставка ВКУСНЕЙШИХ <br> БЛЮд за 60 минут
                        </p>
                        <div class="slider__box">
                            <span class="slider__info">Ещё не пробовал?</span>
                        </div>
                        <img src="../images/first-slider-img.jpg" class="slider__img" alt="slider">
                    </div>
                    <div class="swiper-slide">
                        <p class="slider__description">
                            Доставка ВКУСНЕЙШИХ <br> БЛЮд за 60 минут
                        </p>
                        <div class="slider__box">
                            <span class="slider__info">Ещё не пробовал?</span>
                        </div>
                        <img src="../images/first-slider-img.jpg" class="slider__img" alt="slider">
                    </div>
                    <div class="swiper-slide">
                        <p class="slider__description">
                            Доставка ВКУСНЕЙШИХ <br> БЛЮд за 60 минут
                        </p>
                        <div class="slider__box">
                            <span class="slider__info">Ещё не пробовал?</span>
                        </div>
                        <img src="../images/first-slider-img.jpg" class="slider__img" alt="slider">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="javascript/swiper-bundle.min.js"></script>
    <script src="javascript/main.min.js"></script>
</body>

</html>
